name: Pipeline DevOps

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

steps:
  - name: Baixar código
    uses: actions/checout@v3

  - name: Build da imagem Docker
    run: docker build -t index.php .

  - name: Rodar container
    run: docker run -d -p 8080:80 index.php