version: '3.8'

services:
  web:
    build: .
    container_name: u3_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: u3_db
    restart: always
    environment:
      MYSQL_DATABASE: U3
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: u3_user
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./cargas:/docker-entrypoint-initdb.d

volumes:
  db_data: